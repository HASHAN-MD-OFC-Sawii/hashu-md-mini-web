<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR HASHUU - API Portal</title>
    <style>
        /* Modern Premium Design System */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Geist Sans", "SF Pro Display", Roboto, sans-serif;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pure Pitch Black */
            color: #ffffff;
        }

        /* -------------------------------------------------------------
           STAGE 1: SECURE LOGIN SCREEN (Vercel Dark Style)
        ------------------------------------------------------------- */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .login-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #eaeaea;
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .passcode-input {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .passcode-input:focus {
            border-color: #444444;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background: #eaeaea;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            font-size: 11px;
            color: #ff3333;
            letter-spacing: 1px;
            margin-top: 12px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Error Shake Animation */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        /* -------------------------------------------------------------
           STAGE 2: MINIMAL SERVER CHECKER SCREEN
        ------------------------------------------------------------- */
        .checker-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
            padding: 20px;
        }

        /* Percentage Number - Optimized Size */
        .percentage-num {
            font-size: 48px; /* Kalin thibbe 84px - Dan lassanata podi kala */
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 30%, #555555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 12px;
        }

        .percentage-num::after {
            content: '%';
            font-size: 20px;
            margin-left: 2px;
            color: #666;
            font-weight: 500;
        }

        .status-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #888888;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .progress-track {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            transition: width 0.05s linear;
        }

        /* -------------------------------------------------------------
           STAGE 3: MAIN PORTAL IFRAME LAYER
        ------------------------------------------------------------- */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transform: scale(0.99);
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        iframe.portal-ready {
            opacity: 1;
            transform: scale(1);
        }

        /* Dynamic Exit Classes */
        .fade-out-exit {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .show-checker {
            opacity: 1;
            visibility: visible;
        }

        /* Keyframes */
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="login-box" id="login-box">
            <div class="login-title">ENTER YOUR SERVER CODE</div>
            <div class="input-wrapper">
                <input type="password" class="passcode-input" id="passcode" placeholder="Ex : server1">
            </div>
            <button class="login-btn" onclick="checkPasscode()">Verify</button>
            <div class="error-msg" id="error-text">Access Denied. Server Code.</div>
        </div>
    </div>

    <div class="checker-container" id="loading-screen">
        <div class="percentage-num" id="percentage-counter">0</div>
        <div class="status-label">CHECKING SERVERS...</div>
        
        <div class="progress-track">
            <div class="progress-bar-fill" id="progress-line"></div>
        </div>
    </div>

    <iframe 
        src="https://zahid-mini-bot-production-6f58.up.railway.app/" 
        title="MR HASHUU FREE BOT" 
        id="bot-core-frame">
    </iframe>

    <script>
        // CONFIG: Menna methana thiyena 'HASHUU' eka wenas karala thamanata ona password eka danna puluwan
        const CORRECT_PASSCODE = "HASHUU"; 

        const loginScreen = document.getElementById('login-screen');
        const loginBox = document.getElementById('login-box');
        const passcodeInp = document.getElementById('passcode');
        const errorText = document.getElementById('error-text');

        const iframe = document.getElementById('bot-core-frame');
        const loader = document.getElementById('loading-screen');
        const percentText = document.getElementById('percentage-counter');
        const progressLine = document.getElementById('progress-line');

        // Input eke Enter nala submit wenna set kirima
        passcodeInp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPasscode();
        });

        function checkPasscode() {
            const userInput = passcodeInp.value.trim();

            if (userInput.toUpperCase() === CORRECT_PASSCODE.toUpperCase()) {
                // Passcode eka hari nam Login screen eka ain karala Loading screen ekata yanawa
                loginScreen.classList.add('fade-out-exit');
                loader.classList.add('show-checker');
                startLoadingProgress();
            } else {
                // Passcode eka waradi nam shake effect eka saha error eka trigger wenawa
                loginBox.classList.add('shake');
                errorText.style.opacity = "1";
                passcodeInp.value = "";
                
                setTimeout(() => {
                    loginBox.classList.remove('shake');
                }, 400);
            }
        }

        function startLoadingProgress() {
            const totalDuration = 5000; // Exact 5 seconds
            const intervalStep = 30; 
            let elapsed = 0;

            const timer = setInterval(() => {
                elapsed += intervalStep;
                let currentProgress = Math.floor((elapsed / totalDuration) * 100);

                if (currentProgress >= 100) {
                    currentProgress = 100;
                    clearInterval(timer);
                    revealMainSystem();
                }

                percentText.innerText = currentProgress;
                progressLine.style.width = currentProgress + "%";
            }, intervalStep);
        }

        function revealMainSystem() {
            loader.classList.remove('show-checker');
            loader.classList.add('fade-out-exit');
            iframe.classList.add('portal-ready');
        }
    </script>
</body>
</html>
