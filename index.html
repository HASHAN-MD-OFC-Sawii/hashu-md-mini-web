<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR HASHUU</title>
    <style>
        /* Modern Premium Design System */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Ultra-clean modern tech font stack (Apple/Vercel style) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Geist Sans", "SF Pro Display", Roboto, sans-serif;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pure Pitch Black */
            color: #ffffff;
        }

        /* Full Screen Loader Container */
        .checker-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s;
            padding: 20px;
        }

        /* Large Clean Elegant Percentage */
        .percentage-num {
            font-size: 84px;
            font-weight: 800;
            letter-spacing: -4px;
            background: linear-gradient(180deg, #ffffff 30%, #444444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 10px;
        }

        .percentage-num::after {
            content: '%';
            font-size: 28px;
            margin-left: 4px;
            color: #555;
            font-weight: 500;
            letter-spacing: normal;
        }

        /* Server Checking Label */
        .status-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 600;
            opacity: 0.9;
        }

        /* Premium Minimal Linear Progress Track */
        .progress-track {
            width: 220px;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%; /* Dynamic JS Control */
            background: #ffffff; /* Ultra Minimal White Line */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: width 0.05s linear;
        }

        /* Iframe Styles & Reveal Animation */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transform: scale(0.98); /* Smooth scale up entry */
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Reveal State */
        iframe.portal-ready {
            opacity: 1;
            transform: scale(1);
        }

        .checker-container.fade-out-exit {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Minimalist Server Checker Loading Screen -->
    <div class="checker-container" id="loading-screen">
        <div class="percentage-num" id="percentage-counter">0</div>
        <div class="status-label">CHECKING SERVERS</div>
        
        <div class="progress-track">
            <div class="progress-bar-fill" id="progress-line"></div>
        </div>
    </div>

    <!-- Main Server Portal Core Content[cite: 1] -->
    <!-- created by mr hashuu coder official team -->
    <iframe 
        src="https://zahid-mini-bot-production-6f58.up.railway.app/" 
        title="MR HASHUU FREE BOT" 
        id="bot-core-frame">
    </iframe>

    <script>
        const iframe = document.getElementById('bot-core-frame');
        const loader = document.getElementById('loading-screen');
        const percentText = document.getElementById('percentage-counter');
        const progressLine = document.getElementById('progress-line');

        const totalDuration = 5000; // Exact 5 seconds loading time
        const intervalStep = 30; // Smooth tick interval in milliseconds
        let elapsed = 0;

        const timer = setInterval(() => {
            elapsed += intervalStep;
            let currentProgress = Math.floor((elapsed / totalDuration) * 100);

            if (currentProgress >= 100) {
                currentProgress = 100;
                clearInterval(timer);
                revealMainSystem();
            }

            // Update loading numbers and progress track seamlessly
            percentText.innerText = currentProgress;
            progressLine.style.width = currentProgress + "%";
        }, intervalStep);

        function revealMainSystem() {
            // Smoothly remove loading dashboard and scale in iframe[cite: 1]
            loader.classList.add('fade-out-exit');
            iframe.classList.add('portal-ready');
        }
    </script>
</body>
</html>
